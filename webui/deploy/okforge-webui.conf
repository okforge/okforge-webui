# okforge web UI — Apache vhost (PLAN.md step 7).
# Installed by webui/deploy.sh to /etc/apache2/sites-available/.
#
# Name-based vhost on :80 alongside 000-default and searxng: browse it as
# http://okforge.local/ after adding the server's LAN IP to each client's
# /etc/hosts (or LAN DNS):  <server-ip>  okforge.local
#
# LAN-only, no auth in v1 (PLAN.md). If that ever changes, uncomment the
# basic-auth block below (and create the htpasswd file first):
#   sudo htpasswd -c /etc/apache2/okforge.htpasswd dana
# MCP clients would then need the same credentials
# (http://user:pass@okforge.local/mcp).

<VirtualHost *:80>
    ServerName okforge.local

    # --- optional basic auth (disabled; see header) ------------------
    # <Location />
    #     AuthType Basic
    #     AuthName "okforge"
    #     AuthUserFile /etc/apache2/okforge.htpasswd
    #     Require valid-user
    # </Location>
    # -----------------------------------------------------------------

    # rsync'd copy of webui/static/ (deploy.sh)
    DocumentRoot /var/www/okforge-webui
    <Directory /var/www/okforge-webui>
        Require all granted
        Options -Indexes
        # Frontend files change on every deploy and browsers heuristically
        # cache them (no Cache-Control means Chrome guesses freshness from
        # mtime) — stale app.js repeatedly kept old behavior alive after
        # deploys. no-cache = revalidate every load; ETag/304 keeps it
        # cheap on the LAN. Needs mod_headers (deploy.sh enables it).
        Header set Cache-Control "no-cache"
    </Directory>

    # Everything under /api/ goes to the uvicorn backend.
    ProxyPass        /api/ http://127.0.0.1:8500/api/
    ProxyPassReverse /api/ http://127.0.0.1:8500/api/
    # MCP server (streamable HTTP, stateless JSON) for external clients.
    ProxyPass        /mcp http://127.0.0.1:8500/mcp
    ProxyPassReverse /mcp http://127.0.0.1:8500/mcp
    ProxyPreserveHost On
    # Job SSE ticks every ~0.7s, but `openkb query` streams can pause for
    # a minute-plus mid-tool-call — keep the proxy from timing them out.
    ProxyTimeout 300

    # SSE and streamed query answers must not be buffered: mod_deflate
    # would hold event-stream chunks until its buffer fills.
    SetEnvIf Request_URI "/events$" no-gzip
    <Location /api/>
        SetEnvIf Accept "text/event-stream" no-gzip
    </Location>

    # 500 MB scan uploads (POST /api/inbox)
    LimitRequestBody 524288000

    ErrorLog ${APACHE_LOG_DIR}/okforge-webui-error.log
    CustomLog ${APACHE_LOG_DIR}/okforge-webui-access.log combined
</VirtualHost>
